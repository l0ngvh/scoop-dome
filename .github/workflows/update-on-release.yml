name: Update on Release

on:
  repository_dispatch:
    types: [new-nightly-release]

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Update manifest
        env:
          VERSION: ${{ github.event.client_payload.version }}
          SHA_ZIP: ${{ github.event.client_payload.sha_zip }}
        run: |
          set -euo pipefail
          jq ".version = \"$VERSION\" | .architecture.\"64bit\".hash = \"$SHA_ZIP\"" \
            bucket/dome-nightly.json > tmp.json
          mv tmp.json bucket/dome-nightly.json
      - name: Commit and push
        env:
          VERSION: ${{ github.event.client_payload.version }}
        run: |
          set -euo pipefail
          git config user.name "dome-bot"
          git config user.email "bot@dome.app"
          git add bucket/dome-nightly.json
          git commit -m "chore: bump dome-nightly to $VERSION"
          git push
